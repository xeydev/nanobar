name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must be semver (e.g. 1.2.3)"
            exit 1
          fi

      - name: Build release
        run: bash build-release.sh "${{ inputs.version }}"

      - name: Compute SHA256
        id: sha
        run: |
          sha=$(shasum -a 256 "nanobar-${{ inputs.version }}-arm64.tar.gz" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "NanoBar v${{ inputs.version }}" \
            --notes "SHA256: `${{ steps.sha.outputs.sha256 }}`" \
            "nanobar-${{ inputs.version }}-arm64.tar.gz"

      - name: Trigger formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh workflow run update-formula.yml \
            --repo xeydev/homebrew-tap \
            --field version="${{ inputs.version }}" \
            --field sha256="${{ steps.sha.outputs.sha256 }}"
