name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must be semver (e.g. 1.2.3)"
            exit 1
          fi

      - name: Tag commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Build release
        run: bash build-release.sh

      - name: Compute SHA256
        id: sha
        run: |
          sha=$(shasum -a 256 "nanobar-${{ inputs.version }}-arm64.tar.gz" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "NanoBar v${{ inputs.version }}" \
            --notes "## Install

          \`\`\`bash
          brew tap xeydev/tap
          brew install nanobar
          brew services start nanobar
          \`\`\`

          ## SHA256
          \`${{ steps.sha.outputs.sha256 }}\`" \
            "nanobar-${{ inputs.version }}-arm64.tar.gz"

      - name: Print formula snippet
        run: |
          echo "Update homebrew-tap Formula/nanobar.rb:"
          echo "  version \"${{ inputs.version }}\""
          echo "  sha256 \"${{ steps.sha.outputs.sha256 }}\""
